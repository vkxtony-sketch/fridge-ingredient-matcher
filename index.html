<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge Ingredient Matcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

<header class="bg-emerald-600 text-white py-6 text-center shadow">
  <h1 class="text-3xl font-bold">🍳 Fridge Matcher</h1>
  <p class="text-emerald-100">Fast & smart recipe suggestions</p>
</header>

<main class="max-w-4xl mx-auto p-4 grid md:grid-cols-3 gap-6 flex-grow">

  <section class="bg-white p-6 rounded-xl md:col-span-1">
    <h2 class="font-bold mb-2">Ingredients</h2>
    <textarea id="ingredients" class="w-full h-32 border p-3 rounded" placeholder="egg, bread, cheese"></textarea>
    <button id="find-btn" class="w-full mt-3 bg-emerald-600 text-white py-3 rounded">Find Recipes</button>
  </section>

  <section class="md:col-span-2">
    <h2 class="font-bold mb-3">Results</h2>
    <div id="results" class="space-y-4"></div>
  </section>

</main>

<footer class="text-center text-xs text-slate-400 py-6">© 2026</footer>

<script type="module" src="src/js/app.js"></script>

</body>
</html>
