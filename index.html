<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Ingredient Matcher</title>
    <!-- Modern Tailwind CSS via CDN -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-emerald-600 text-white shadow-md py-6 text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">🍳 Fridge Ingredient Matcher</h1>
        <p class="text-emerald-100 mt-1">Stop wasting food. Find recipes with what you already have.</p>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Input Sidebar Section -->
        <section id="ingredient-input" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 md:col-span-1 h-fit">
            <h2 class="text-lg font-bold text-slate-900 mb-3">Your Kitchen Fridge</h2>
            <p class="text-xs text-slate-500 mb-4">Type ingredients separated by commas.</p>
            
            <textarea
                id="ingredients"
                class="w-full h-32 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-sm resize-none"
                placeholder="Example: bread, cheese, butter, chicken"
            ></textarea>

            <button id="find-btn" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-sm hover:shadow active:scale-[0.98]">
                Find Recipes ✨
            </button>
        </section>

        <!-- Dynamic Results Section -->
        <section class="md:col-span-2">
            <h2 class="text-xl font-bold text-slate-900 mb-4">Recipe Matches</h2>
            <div id="results" class="grid grid-cols-1 gap-4">
                <p class="text-slate-400 italic bg-white p-6 rounded-2xl border border-dashed border-slate-200 text-center">
                    Enter ingredients on the left to discover matching meals!
                </p>
            </div>
        </section>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-4 text-center text-xs mt-12 border-t border-slate-900">
        <p>&copy; 2026 Fridge Ingredient Matcher. Open Source Portfolio Project.</p>
    </footer>

   <script type="module" src="src/js/app.js"></script>
</body>
</html>
