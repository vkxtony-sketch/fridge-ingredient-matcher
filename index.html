<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Ingredient Matcher</title>
</head>
<body>
    <header>
        <h1>Fridge Ingredient Matcher</h1>
    </header>

    <main>
        <section id="ingredient-input">
            <h2>Your Ingredients</h2>
            <textarea
                id="ingredients"
                placeholder="Example: bread, cheese, butter"
            ></textarea>
            <br><br>
            <button id="find-btn">
                Find Recipes
            </button>
        </section>

        <section id="results">
            <h2>Recipe Matches</h2>
            <div id="matches-container">
                <p>Matching recipes will appear here.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Fridge Ingredient Matcher</p>
    </footer>
    <script type="module" src="./src/js/app.js"></script>
</body>
</html>
