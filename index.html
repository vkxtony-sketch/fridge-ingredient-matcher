<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Ingredient Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

<header class="bg-emerald-600 text-white shadow-md py-6 text-center">
    <h1 class="text-3xl font-extrabold">🍳 Fridge Ingredient Matcher</h1>
    <p class="text-emerald-100">Stop wasting food. Find recipes instantly.</p>
</header>

<main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">

    <section class="bg-white p-6 rounded-2xl shadow-sm md:col-span-1">
        <h2 class="font-bold mb-2">Your Ingredients</h2>
        <textarea id="ingredients" class="w-full h-32 border rounded p-3" placeholder="egg, rice, chicken"></textarea>
        <button id="find-btn" class="w-full mt-4 bg-emerald-600 text-white py-3 rounded">Find Recipes ✨</button>
    </section>

    <section class="md:col-span-2">
        <h2 class="font-bold mb-4">Results</h2>
        <div id="results" class="space-y-4"></div>
    </section>

</main>

<footer class="text-center text-xs text-slate-400 py-6">
    &copy; 2026 Fridge App
</footer>

<script type="module" src="src/js/app.js"></script>

</body>
</html>
